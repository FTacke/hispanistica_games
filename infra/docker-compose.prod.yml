# =============================================================================
# games_hispanistica canonical production compose
# =============================================================================
#
# This stack intentionally defines only the web service. The PostgreSQL service
# is provisioned outside this repository and must already be reachable via the
# external backend network under the configured service name.

services:
  web:
    image: games-web-prod:latest
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: games-web-prod
    ports:
      - "127.0.0.1:7000:5000"
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "false"
      FLASK_SECRET_KEY: ${FLASK_SECRET_KEY:?FLASK_SECRET_KEY is required}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      AUTH_DATABASE_URL: ${AUTH_DATABASE_URL:?AUTH_DATABASE_URL is required}
      QUIZ_DATABASE_URL: ${QUIZ_DATABASE_URL:?QUIZ_DATABASE_URL is required}
      AUTH_HASH_ALGO: ${AUTH_HASH_ALGO:-argon2}
      JWT_COOKIE_SECURE: ${JWT_COOKIE_SECURE:-true}
      FLASK_SESSION_SECURE: ${FLASK_SESSION_SECURE:-true}
      FLASK_SESSION_SAMESITE: ${FLASK_SESSION_SAMESITE:-lax}
      DB_WAIT_SECONDS: ${DB_WAIT_SECONDS:-120}
      ADMIN_BOOTSTRAP: ${ADMIN_BOOTSTRAP:-0}
      START_ADMIN_USERNAME: ${START_ADMIN_USERNAME:-admin}
      START_ADMIN_PASSWORD: ${START_ADMIN_PASSWORD:-}
      START_ADMIN_EMAIL: ${START_ADMIN_EMAIL:-admin@games.hispanistica.com}
      GIT_COMMIT: ${GIT_COMMIT:-unknown}
    volumes:
      - ${GAMES_DATA_DIR:-/srv/webapps/games_hispanistica/data}:/app/data
      - ${GAMES_MEDIA_DIR:-/srv/webapps/games_hispanistica/media}:/app/media
      - ${GAMES_LOGS_DIR:-/srv/webapps/games_hispanistica/logs}:/app/logs
      - ${GAMES_KEYS_DIR:-/srv/webapps/games_hispanistica/config/keys}:/app/config/keys:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - backend

networks:
  backend:
    name: ${GAMES_BACKEND_NETWORK:-games-backend-prod}
    external: true
