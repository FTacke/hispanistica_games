name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy games_hispanistica
    runs-on: [self-hosted, games-prod]

    steps:
      - name: Check deploy prerequisites
        run: |
          if [ ! -d /srv/webapps/games_hispanistica/app ]; then
            echo "app dir missing"
            exit 1
          fi

          if ! command -v docker >/dev/null 2>&1; then
            echo "docker missing"
            exit 1
          fi

      - name: Debug environment
        run: |
          echo "=== Environment Debug ==="
          whoami
          pwd
          ls -la /srv/webapps/games_hispanistica/app
          docker network ls | grep -E 'NAME|games-backend-prod' || true
          
      - name: Sync server checkout to workflow commit
        run: |
          cd /srv/webapps/games_hispanistica/app
          git fetch origin
          git checkout --force "$GITHUB_SHA"
          git reset --hard "$GITHUB_SHA"
          git clean -fd
          
      - name: Deploy via deploy_prod.sh
        run: |
          cd /srv/webapps/games_hispanistica/app
          # Production compose invocations stay centralized in deploy_prod.sh
          # so the explicit project name cannot be bypassed accidentally.
          bash scripts/deploy/deploy_prod.sh

      - name: Final verification
        run: |
          if docker ps --format '{{.Names}}' | grep -q '^games-web-prod$'; then
            echo "✓ Container games-web-prod is running"
            docker ps --filter "name=games-web-prod" --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          else
            echo "✗ Container games-web-prod is not running"
            docker logs games-web-prod 2>&1 | tail -50 || true
            exit 1
          fi

          HEALTH=$(curl -sf http://127.0.0.1:7000/health || echo "FAILED")
          if echo "$HEALTH" | grep -q '"status"'; then
            echo "✓ Health check passed: $HEALTH"
          else
            echo "✗ Health check failed"
            exit 1
          fi
